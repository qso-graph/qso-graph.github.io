site_name: qso-graph — MCP Servers for Ham Radio
site_description: >-
  Open-source MCP servers connecting AI assistants to ham radio services.
  Open-source MCP servers connecting AI assistants to ham radio services.
  ADIF validation, eQSL, QRZ, LoTW, HamQTH, POTA, SOTA, IOTA, space weather, and WSPR analytics. Secure by design.
site_author: Greg Beam, KI7MT
site_url: https://qso-graph.io/
repo_url: https://github.com/qso-graph/qso-graph.github.io

theme:
  name: material
  custom_dir: overrides
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - content.code.copy

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/qso-graph
      name: qso-graph on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/search/?q=qso-graph
      name: qso-graph packages on PyPI

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Credential Setup: credentials.md
  - Servers:
    - servers/index.md
    - Foundation:
      - adif-mcp: servers/adif-mcp.md
    - Logbook Services:
      - eQSL: servers/eqsl.md
      - QRZ: servers/qrz.md
      - LoTW: servers/lotw.md
      - HamQTH: servers/hamqth.md
    - Public Services:
      - POTA: servers/pota.md
      - SOTA: servers/sota.md
      - IOTA: servers/iota.md
      - Solar Weather: servers/solar.md
      - WSPR: servers/wspr.md
  - Architecture: architecture.md
  - Testing: testing.md
  - Demo: https://qso-graph-demo.vercel.app/
  - Security: security.md
  - About:
    - about/index.md
    - Contributing: about/contributing.md
